<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBS Game-style To-Do List</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
      body {
        margin: 0;
        background: transparent;
        font-family: "Fredoka", sans-serif;
      }

      .todolist-container {
        position: absolute;
        top: 50px;
        right: 50px;
        min-width: 350px;
        padding: 16px 28px;
        border-radius: 36px;
        background: linear-gradient(to bottom, #e6f2f8 0%, #c4ddea 100%);
        border: 3px solid #9fb2bf;
        box-shadow:
          inset 0 3px 6px rgba(255, 255, 255, 0.9),
          inset 0 -4px 6px rgba(0, 0, 0, 0.25),
          0 3px 6px rgba(0, 0, 0, 0.35);
        color: #fff;
      }

      .todolist-header {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          0 2px 3px rgba(0, 0, 0, 0.9);
      }

      .todolist-item {
        font-size: 22px;
        margin: 6px 0;
        padding: 6px 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .todolist-item.completed {
        opacity: 0.7;
        text-decoration: line-through;
      }

      .todolist-item button {
        margin-left: 6px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        padding: 2px 6px;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        transition: background 0.2s;
      }

      .todolist-item button:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      #addButton {
        margin-top: 8px;
        font-size: 16px;
        padding: 6px 12px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #ffffff33;
        color: #fff;
        font-weight: 700;
        transition: background 0.2s;
      }

      #addButton:hover {
        background: #ffffff66;
      }
    </style>
  </head>
  <body>
    <div class="todolist-container">
      <div class="todolist-header">Pengu World Quest List</div>
      <div id="list"></div>
      <button id="addButton">➕ Add Item</button>
    </div>

    <script>
      // 🔑 Supabase Setup
      const SUPABASE_URL = "https://lynswnaseulskfuweemj.supabase.co"; // ganti sesuai project
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5bnN3bmFzZXVsc2tmdXdlZW1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDM4NjgsImV4cCI6MjA5MDQxOTg2OH0.JjgokC0xqle9D_qbJ3fN10uUaMrCoAq0ttxo1dsa8vA"; // ganti sesuai project
      const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const listDiv = document.getElementById("list");
      const addBtn = document.getElementById("addButton");

      // Load semua task
      async function loadTasks() {
        listDiv.innerHTML = "";
        const { data: tasks, error } = await supabase
          .from("tasks")
          .select("*")
          .order("created_at", { ascending: true });

        if (error) return console.error(error);

        tasks.forEach(renderTask);
      }

      // Render task ke DOM
      function renderTask(task) {
        const div = document.createElement("div");
        div.className = "todolist-item" + (task.completed ? " completed" : "");

        const span = document.createElement("span");
        span.textContent = task.text;
        div.appendChild(span);

        const checkBtn = document.createElement("button");
        checkBtn.textContent = "✅";
        checkBtn.onclick = async () => {
          await supabase
            .from("tasks")
            .update({ completed: !task.completed })
            .eq("id", task.id);
          loadTasks();
        };
        div.appendChild(checkBtn);

        const editBtn = document.createElement("button");
        editBtn.textContent = "✏️";
        editBtn.onclick = async () => {
          const newText = prompt("Edit task:", span.textContent);
          if (newText !== null) {
            await supabase
              .from("tasks")
              .update({ text: newText })
              .eq("id", task.id);
            loadTasks();
          }
        };
        div.appendChild(editBtn);

        const delBtn = document.createElement("button");
        delBtn.textContent = "🗑️";
        delBtn.onclick = async () => {
          await supabase.from("tasks").delete().eq("id", task.id);
          loadTasks();
        };
        div.appendChild(delBtn);

        listDiv.appendChild(div);
      }

      // Add Item button
      addBtn.onclick = async () => {
        const text = prompt("New task:");
        if (text) {
          await supabase.from("tasks").insert({ text, completed: false });
          loadTasks();
        }
      };

      // Auto-refresh tiap 5 detik supaya OBS langsung update
      loadTasks();
      setInterval(loadTasks, 5000);
    </script>
  </body>
</html>
