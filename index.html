<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        background: transparent;
        font-family: "Fredoka", sans-serif;
      }

      /* Container */
      .todolist-container {
        position: absolute;
        top: 50px;
        right: 50px;
        min-width: 350px;
        padding: 16px 28px;
        border-radius: 36px;
        background: linear-gradient(to bottom, #e6f2f8 0%, #c4ddea 100%);
        border: 3px solid #9fb2bf;
        box-shadow:
          inset 0 3px 6px rgba(255, 255, 255, 0.9),
          inset 0 -4px 6px rgba(0, 0, 0, 0.25),
          0 3px 6px rgba(0, 0, 0, 0.35);
        color: #ffffff;
      }

      /* Header */
      .todolist-header {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 12px;
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          0 2px 3px rgba(0, 0, 0, 0.9);
      }

      /* Item */
      .todolist-item {
        font-size: 20px;
        margin: 6px 0;
        padding: 6px 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .todolist-item.completed {
        opacity: 0.7;
        text-decoration: line-through;
      }

      /* Buttons inside item */
      .todolist-item button {
        margin-left: 6px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        padding: 2px 6px;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        transition: background 0.2s;
      }

      .todolist-item button:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      /* Add item button */
      #addButton {
        margin-top: 8px;
        font-size: 16px;
        padding: 6px 12px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #ffffff33;
        color: #fff;
        font-weight: 700;
        transition: background 0.2s;
      }

      #addButton:hover {
        background: #ffffff66;
      }
    </style>
  </head>
  <body>
    <div class="todolist-container">
      <div class="todolist-header">Pengu World Quest List</div>
      <div id="list"></div>
      <button id="addButton">➕ Add Item</button>
    </div>

    <script>
      const list = document.getElementById("list");

      // Ambil data dari localStorage atau default
      let tasks = JSON.parse(localStorage.getItem("todolist")) || [
        { text: "Check OBS scene layout", completed: false },
        { text: "Add game clock overlay", completed: false },
        { text: "Test browser source in OBS", completed: false },
      ];

      // Render semua task
      function renderTasks() {
        list.innerHTML = "";
        tasks.forEach((task, index) => {
          createItem(task.text, task.completed, index);
        });
      }

      // Update localStorage
      function saveTasks() {
        localStorage.setItem("todolist", JSON.stringify(tasks));
      }

      // Buat item
      function createItem(text, completed = false, index) {
        const div = document.createElement("div");
        div.className = "todolist-item";
        if (completed) div.classList.add("completed");

        const span = document.createElement("span");
        span.textContent = text;
        div.appendChild(span);

        // Centang
        const checkBtn = document.createElement("button");
        checkBtn.textContent = "✅";
        checkBtn.onclick = () => {
          div.classList.toggle("completed");
          tasks[index].completed = div.classList.contains("completed");
          saveTasks();
        };
        div.appendChild(checkBtn);

        // Edit
        const editBtn = document.createElement("button");
        editBtn.textContent = "✏️";
        editBtn.onclick = () => {
          const newText = prompt("Edit task:", span.textContent);
          if (newText !== null) {
            span.textContent = newText;
            tasks[index].text = newText;
            saveTasks();
          }
        };
        div.appendChild(editBtn);

        // Hapus
        const delBtn = document.createElement("button");
        delBtn.textContent = "🗑️";
        delBtn.onclick = () => {
          tasks.splice(index, 1);
          saveTasks();
          renderTasks();
        };
        div.appendChild(delBtn);

        list.appendChild(div);
      }

      // Tombol add item
      document.getElementById("addButton").onclick = () => {
        tasks.push({ text: "New Task", completed: false });
        saveTasks();
        renderTasks();
      };

      // Render awal
      renderTasks();
    </script>
  </body>
</html>
